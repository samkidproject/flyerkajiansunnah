<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jalus App - Jadwal Ustadz Sunnah</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        .icon-placeholder {
            display: inline-block;
            width: 1.25rem;
            height: 1.25rem;
            background-color: currentColor;
            mask-size: contain;
            mask-repeat: no-repeat;
            mask-position: center;
            -webkit-mask-size: contain;
        }
        .icon-calendar { -webkit-mask-image: url('https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/calendar.svg'); }
        .icon-search { -webkit-mask-image: url('https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/search.svg'); }
        .icon-copy { -webkit-mask-image: url('https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/copy.svg'); }
        .icon-clock { -webkit-mask-image: url('https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/clock.svg'); }
        .icon-plus { -webkit-mask-image: url('https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/plus.svg'); }
        .icon-user { -webkit-mask-image: url('https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/user.svg'); }
        .icon-trash { -webkit-mask-image: url('https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/trash-2.svg'); }
        .icon-settings { -webkit-mask-image: url('https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/settings.svg'); }
        .icon-filter { -webkit-mask-image: url('https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/filter.svg'); }
        .icon-building { -webkit-mask-image: url('https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/building-2.svg'); }
        .icon-edit { -webkit-mask-image: url('https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/edit-3.svg'); }
        .icon-x { -webkit-mask-image: url('https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/x.svg'); }
        .icon-lock { -webkit-mask-image: url('https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/lock.svg'); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbdg0ZMcRwiz2VKmXPbAhoOdmpX8tQdHk", 
            authDomain: "jadwalustadz-690ee.firebaseapp.com",
            projectId: "jadwalustadz-690ee",
            storageBucket: "jadwalustadz-690ee.firebasestorage.app",
            messagingSenderId: "1057199802583",
            appId: "1:1057199802583:web:101668bf3327a8896cc892"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'ustadz-schedule-v3';

        const LIST_KOTA = [
            "Bandar Lampung", "Metro", "Lampung Selatan", "Lampung Tengah", 
            "Lampung Utara", "Lampung Barat", "Lampung Timur", "Tanggamus", 
            "Tulang Bawang", "Tulang Bawang Barat", "Way Kanan", "Mesuji", 
            "Pesawaran", "Pringsewu", "Pesisir Barat"
        ].sort();

        function Icon({ name, className = "" }) {
            return <span className={`icon-placeholder icon-${name} ${className}`}></span>;
        }

        function App() {
            const [user, setUser] = React.useState(null);
            const [view, setView] = React.useState('public'); // 'public', 'login', 'admin'
            const [isAdminLoggedIn, setIsAdminLoggedIn] = React.useState(false);
            const [adminSubView, setAdminSubView] = React.useState('input-jadwal');
            const [activeTab, setActiveTab] = React.useState('khatib');
            
            // Login States
            const [loginData, setLoginData] = React.useState({ username: '', password: '' });

            const [ustadzList, setUstadzList] = React.useState([]);
            const [masjidList, setMasjidList] = React.useState([]);
            const [schedules, setSchedules] = React.useState([]);
            
            const [searchQuery, setSearchQuery] = React.useState('');
            const [dateQuery, setDateQuery] = React.useState('');
            const [cityFilter, setCityFilter] = React.useState('');
            
            const [loading, setLoading] = React.useState(true);
            const [status, setStatus] = React.useState(null);
            const [editingId, setEditingId] = React.useState(null);

            // Admin States
            const [inputUstadz, setInputUstadz] = React.useState('');
            const [honorific, setHonorific] = React.useState('Ustadz');
            const [inputMasjid, setInputMasjid] = React.useState('');
            const [inputMasjidKota, setInputMasjidKota] = React.useState('');

            const [formData, setFormData] = React.useState({
                ustadzId: '', tanggal: '', jam: '', masjid: '', kota: '', topik: '', tipe: 'khatib'
            });

            React.useEffect(() => {
                const startAuth = async () => {
                    try { await signInAnonymously(auth); } catch (err) { console.error(err); }
                };
                startAuth();
                return onAuthStateChanged(auth, setUser);
            }, []);

            React.useEffect(() => {
                if (!user) return;
                const ustadzRef = collection(db, 'artifacts', appId, 'public', 'data', 'ustadz');
                const masjidRef = collection(db, 'artifacts', appId, 'public', 'data', 'masjids');
                const scheduleRef = collection(db, 'artifacts', appId, 'public', 'data', 'schedules');

                const unsubUstadz = onSnapshot(ustadzRef, (snap) => {
                    setUstadzList(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a,b) => a.nama.localeCompare(b.nama)));
                });
                const unsubMasjid = onSnapshot(masjidRef, (snap) => {
                    setMasjidList(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a,b) => a.nama.localeCompare(b.nama)));
                });
                const unsubSchedules = onSnapshot(scheduleRef, (snap) => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setSchedules(data.sort((a, b) => new Date(a.tanggal) - new Date(b.tanggal)));
                    setLoading(false);
                });

                return () => { unsubUstadz(); unsubMasjid(); unsubSchedules(); };
            }, [user]);

            const showStatus = (msg) => {
                setStatus(msg);
                setTimeout(() => setStatus(null), 3000);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginData.username === 'admin' && loginData.password === 'sunnah') {
                    setIsAdminLoggedIn(true);
                    setView('admin');
                    showStatus("Selamat Datang Admin");
                } else {
                    showStatus("Username atau Password Salah");
                }
            };

            const handleToggleView = () => {
                if (view === 'public') {
                    if (isAdminLoggedIn) {
                        setView('admin');
                    } else {
                        setView('login');
                    }
                } else {
                    setView('public');
                }
            };

            // Ustadz Admin
            const handleSaveUstadz = async () => {
                if (!inputUstadz.trim() || !user) return;
                const fullName = `${honorific} ${inputUstadz.trim()} Hafidzahullah`;
                if (editingId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'ustadz', editingId), { nama: fullName });
                    showStatus("Ustadz Diperbarui");
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'ustadz'), { nama: fullName, createdAt: new Date().toISOString() });
                    showStatus("Ustadz Ditambahkan");
                }
                setEditingId(null); setInputUstadz('');
            };

            // Masjid Admin
            const handleSaveMasjid = async () => {
                if (!inputMasjid.trim() || !inputMasjidKota || !user) return;
                const data = { nama: inputMasjid.trim(), kota: inputMasjidKota };
                if (editingId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'masjids', editingId), data);
                    showStatus("Masjid Diperbarui");
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'masjids'), { ...data, createdAt: new Date().toISOString() });
                    showStatus("Masjid Ditambahkan");
                }
                setEditingId(null); setInputMasjid(''); setInputMasjidKota('');
            };

            // Schedule Admin
            const handleSaveSchedule = async (e) => {
                e.preventDefault();
                if (!formData.ustadzId || !formData.tanggal || !formData.masjid || !user) return;
                const ustadz = ustadzList.find(u => u.id === formData.ustadzId);
                const payload = { ...formData, ustadzNama: ustadz.nama, updatedAt: new Date().toISOString() };
                if (editingId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'schedules', editingId), payload);
                    showStatus("Jadwal Diperbarui");
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'schedules'), { ...payload, createdAt: new Date().toISOString() });
                    showStatus("Jadwal Dipublikasikan");
                }
                setEditingId(null); setFormData({ ustadzId: '', tanggal: '', jam: '', masjid: '', kota: '', topik: '', tipe: 'khatib' });
            };

            const deleteItem = async (col, id) => {
                if (!confirm("Hapus data ini?")) return;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', col, id));
                showStatus("Terhapus");
            };

            const filtered = schedules.filter(s => {
                const matchesTab = s.tipe === activeTab;
                const matchesSearch = s.ustadzNama?.toLowerCase().includes(searchQuery.toLowerCase()) || s.masjid?.toLowerCase().includes(searchQuery.toLowerCase());
                const matchesDate = dateQuery === '' || s.tanggal === dateQuery;
                const matchesCity = cityFilter === '' || s.kota === cityFilter;
                return matchesTab && matchesSearch && matchesDate && matchesCity;
            });

            const copyToWhatsApp = () => {
                if (filtered.length === 0) {
                    showStatus("Tidak ada jadwal untuk disalin");
                    return;
                }
                let text = `📌 *JADWAL ${activeTab === 'khatib' ? 'KHATIB JUMAT' : 'KAJIAN SUNNAH'}*\n`;
                text += `📍 Wilayah: ${cityFilter || 'Seluruh Lampung'}\n`;
                text += `----------------------------------\n\n`;
                filtered.forEach((s, i) => {
                    const dateObj = new Date(s.tanggal);
                    const dateStr = dateObj.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
                    text += `${i + 1}. *${s.ustadzNama}*\n   🗓 ${dateStr}\n   ⏰ Pukul ${s.jam} WIB\n   🕌 ${s.masjid} (${s.kota})\n`;
                    if (s.topik) text += `   📖 Tema: _${s.topik}_\n`;
                    text += `\n`;
                });
                text += `_Disebarkan via Jalus App_`;
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    showStatus("Teks berhasil disalin!");
                } catch (err) { showStatus("Gagal menyalin"); }
                document.body.removeChild(textArea);
            };

            return (
                <div className="min-h-screen pb-20 bg-slate-50 relative">
                    <header className="bg-emerald-800 text-white p-5 shadow-lg sticky top-0 z-50">
                        <div className="max-w-xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-white/10 w-10 h-10 rounded-xl flex items-center justify-center border border-white/20">
                                    <i className="fa-solid fa-mosque text-xl"></i>
                                </div>
                                <div>
                                    <h1 className="text-xl font-black uppercase tracking-tighter leading-none">Jalus App</h1>
                                    <p className="text-[8px] font-bold opacity-70 tracking-widest uppercase mt-1">Jadwal Ustadz Sunnah</p>
                                </div>
                            </div>
                            <button onClick={handleToggleView} className="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-xl text-[10px] font-black uppercase border border-white/20 flex items-center gap-2 transition-colors">
                                <Icon name={view === 'public' ? 'settings' : 'user'} className="w-3 h-3" />
                                {view === 'public' ? 'Admin' : 'Publik'}
                            </button>
                        </div>
                    </header>

                    <main className="max-w-xl mx-auto p-4 space-y-6">
                        {view === 'login' && (
                            <div className="animate-fade-in flex flex-col items-center justify-center py-10">
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100 w-full max-w-sm space-y-6">
                                    <div className="text-center space-y-2">
                                        <div className="w-16 h-16 bg-emerald-100 text-emerald-700 rounded-3xl flex items-center justify-center mx-auto mb-4">
                                            <Icon name="lock" className="w-8 h-8" />
                                        </div>
                                        <h2 className="text-xl font-black uppercase text-slate-800">Admin Login</h2>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Silahkan masuk ke panel kontrol</p>
                                    </div>
                                    <form onSubmit={handleLogin} className="space-y-4">
                                        <input 
                                            type="text" 
                                            placeholder="Username" 
                                            value={loginData.username}
                                            onChange={e => setLoginData({...loginData, username: e.target.value})}
                                            className="w-full bg-slate-50 p-4 rounded-2xl text-xs font-bold outline-none border-2 border-transparent focus:border-emerald-500" 
                                        />
                                        <input 
                                            type="password" 
                                            placeholder="Password" 
                                            value={loginData.password}
                                            onChange={e => setLoginData({...loginData, password: e.target.value})}
                                            className="w-full bg-slate-50 p-4 rounded-2xl text-xs font-bold outline-none border-2 border-transparent focus:border-emerald-500" 
                                        />
                                        <button type="submit" className="w-full bg-emerald-700 text-white py-4 rounded-2xl font-black text-xs uppercase shadow-xl active:scale-95 transition-transform">
                                            Masuk
                                        </button>
                                        <button type="button" onClick={() => setView('public')} className="w-full text-slate-400 text-[10px] font-black uppercase py-2">Batal</button>
                                    </form>
                                    <div className="text-center pt-2">
                                        <p className="text-[8px] font-black uppercase tracking-[0.2em] text-slate-300">&copy; SAMKID PROJECT</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'admin' && (
                            <div className="space-y-6 animate-fade-in">
                                <div className="flex bg-slate-200 p-1 rounded-2xl gap-1">
                                    <button onClick={() => {setAdminSubView('input-jadwal'); setEditingId(null);}} className={`flex-1 py-3 rounded-xl text-[9px] font-black uppercase ${adminSubView === 'input-jadwal' ? 'bg-white text-emerald-800 shadow-sm' : 'text-slate-500'}`}>Input Jadwal</button>
                                    <button onClick={() => {setAdminSubView('master-ustadz'); setEditingId(null);}} className={`flex-1 py-3 rounded-xl text-[9px] font-black uppercase ${adminSubView === 'master-ustadz' ? 'bg-white text-emerald-800 shadow-sm' : 'text-slate-500'}`}>DB Ustadz</button>
                                    <button onClick={() => {setAdminSubView('master-masjid'); setEditingId(null);}} className={`flex-1 py-3 rounded-xl text-[9px] font-black uppercase ${adminSubView === 'master-masjid' ? 'bg-white text-emerald-800 shadow-sm' : 'text-slate-500'}`}>DB Masjid</button>
                                </div>

                                {adminSubView === 'input-jadwal' && (
                                    <section className="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100">
                                        <h2 className="text-[10px] font-black uppercase text-slate-400 mb-4 tracking-widest">{editingId ? 'Edit Jadwal' : 'Posting Jadwal'}</h2>
                                        <form onSubmit={handleSaveSchedule} className="space-y-4">
                                            <div className="grid grid-cols-2 gap-3">
                                                <select value={formData.tipe} onChange={e => setFormData({...formData, tipe: e.target.value})} className="w-full bg-slate-50 p-3 rounded-xl text-[10px] font-bold outline-none border-2 border-transparent focus:border-emerald-500">
                                                    <option value="khatib">Khatib Jumat</option>
                                                    <option value="kajian">Kajian Sunnah</option>
                                                </select>
                                                <select value={formData.ustadzId} onChange={e => setFormData({...formData, ustadzId: e.target.value})} className="w-full bg-slate-50 p-3 rounded-xl text-[10px] font-bold outline-none border-2 border-transparent focus:border-emerald-500" required>
                                                    <option value="">-- Pilih Ustadz --</option>
                                                    {ustadzList.map(u => <option key={u.id} value={u.id}>{u.nama}</option>)}
                                                </select>
                                            </div>
                                            <div className="grid grid-cols-2 gap-3">
                                                <select value={formData.masjid} onChange={e => {
                                                    const m = masjidList.find(ml => ml.nama === e.target.value);
                                                    setFormData({...formData, masjid: e.target.value, kota: m ? m.kota : ''});
                                                }} className="w-full bg-slate-50 p-3 rounded-xl text-[10px] font-bold outline-none border-2 border-transparent focus:border-emerald-500" required>
                                                    <option value="">-- Pilih Masjid --</option>
                                                    {masjidList.map(m => <option key={m.id} value={m.nama}>{m.nama}</option>)}
                                                </select>
                                                <input type="text" value={formData.kota} readOnly className="w-full bg-slate-100 p-3 rounded-xl text-[10px] font-black text-emerald-700" placeholder="Kota" />
                                            </div>
                                            <div className="grid grid-cols-2 gap-3">
                                                <input type="date" value={formData.tanggal} onChange={e => setFormData({...formData, tanggal: e.target.value})} className="w-full bg-slate-50 p-3 rounded-xl text-[10px] font-bold outline-none border-2 border-transparent focus:border-emerald-500" required />
                                                <input type="time" value={formData.jam} onChange={e => setFormData({...formData, jam: e.target.value})} className="w-full bg-slate-50 p-3 rounded-xl text-[10px] font-bold outline-none border-2 border-transparent focus:border-emerald-500" required />
                                            </div>
                                            <input type="text" placeholder="Tema (Opsional)" value={formData.topik} onChange={e => setFormData({...formData, topik: e.target.value})} className="w-full bg-slate-50 p-3 rounded-xl text-[10px] font-bold outline-none border-2 border-transparent focus:border-emerald-500" />
                                            <button type="submit" className="w-full bg-emerald-700 text-white py-4 rounded-2xl font-black text-xs uppercase shadow-xl">{editingId ? 'Simpan Edit' : 'Publish'}</button>
                                        </form>
                                    </section>
                                )}

                                {adminSubView === 'master-ustadz' && (
                                    <section className="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100">
                                        <div className="flex gap-2 mb-4">
                                            <select value={honorific} onChange={e => setHonorific(e.target.value)} className="bg-slate-50 p-3 rounded-xl text-[10px] font-bold outline-none">
                                                <option value="Ustadz">Ustadz</option>
                                                <option value="Ustadzah">Ustadzah</option>
                                            </select>
                                            <input type="text" value={inputUstadz} onChange={e => setInputUstadz(e.target.value)} placeholder="Nama..." className="flex-1 bg-slate-50 p-3 rounded-xl text-[10px] font-bold outline-none" />
                                            <button onClick={handleSaveUstadz} className="bg-emerald-600 text-white px-4 rounded-xl"><Icon name="plus" /></button>
                                        </div>
                                        <div className="space-y-2 max-h-[400px] overflow-y-auto no-scrollbar">
                                            {ustadzList.map(u => (
                                                <div key={u.id} className="p-3 bg-slate-50 rounded-xl flex justify-between items-center text-[10px] font-bold border border-slate-100">
                                                    <span>{u.nama}</span>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => {setEditingId(u.id); setInputUstadz(u.nama.replace('Ustadz ', '').replace('Ustadzah ', '').replace(' Hafidzahullah', ''));}} className="text-orange-500"><Icon name="edit" className="w-3.5 h-3.5"/></button>
                                                        <button onClick={() => deleteItem('ustadz', u.id)} className="text-red-500"><Icon name="trash" className="w-3.5 h-3.5" /></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                )}

                                {adminSubView === 'master-masjid' && (
                                    <section className="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100">
                                        <div className="space-y-3 mb-4">
                                            <input type="text" value={inputMasjid} onChange={e => setInputMasjid(e.target.value)} placeholder="Nama Masjid..." className="w-full bg-slate-50 p-3 rounded-xl text-[10px] font-bold outline-none" />
                                            <div className="flex gap-2">
                                                <select value={inputMasjidKota} onChange={e => setInputMasjidKota(e.target.value)} className="flex-1 bg-slate-50 p-3 rounded-xl text-[10px] font-bold outline-none">
                                                    <option value="">-- Pilih Kota --</option>
                                                    {LIST_KOTA.map(k => <option key={k} value={k}>{k}</option>)}
                                                </select>
                                                <button onClick={handleSaveMasjid} className="bg-blue-600 text-white px-6 rounded-xl text-[10px] font-black">SIMPAN</button>
                                            </div>
                                        </div>
                                        <div className="space-y-2 max-h-[400px] overflow-y-auto no-scrollbar">
                                            {masjidList.map(m => (
                                                <div key={m.id} className="p-3 bg-slate-50 rounded-xl flex justify-between items-center text-[10px] font-bold border border-slate-100">
                                                    <div>{m.nama} <span className="text-slate-400 font-normal">({m.kota})</span></div>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => {setEditingId(m.id); setInputMasjid(m.nama); setInputMasjidKota(m.kota);}} className="text-orange-500"><Icon name="edit" className="w-3.5 h-3.5"/></button>
                                                        <button onClick={() => deleteItem('masjids', m.id)} className="text-red-500"><Icon name="trash" className="w-3.5 h-3.5" /></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                )}
                            </div>
                        )}

                        {view === 'public' && (
                            <div className="space-y-4 animate-fade-in">
                                <div className="bg-white p-5 rounded-[2.5rem] shadow-sm border border-slate-100 space-y-4">
                                    <div className="relative">
                                        <Icon name="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" />
                                        <input type="text" placeholder="Cari Ustadz atau Masjid..." className="w-full bg-slate-50 p-4 pl-12 rounded-2xl text-xs font-bold outline-none border-2 border-transparent focus:border-emerald-500 transition-all" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <select value={cityFilter} onChange={e => setCityFilter(e.target.value)} className="w-full bg-slate-50 p-4 rounded-2xl text-[10px] font-black uppercase outline-none appearance-none cursor-pointer">
                                            <option value="">Semua Wilayah</option>
                                            {LIST_KOTA.map(k => <option key={k} value={k}>{k}</option>)}
                                        </select>
                                        <input type="date" className="w-full bg-slate-50 p-4 rounded-2xl text-[10px] font-black outline-none" value={dateQuery} onChange={e => setDateQuery(e.target.value)} />
                                    </div>
                                </div>

                                <div className="flex bg-slate-200 p-1 rounded-2xl">
                                    <button onClick={() => setActiveTab('khatib')} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase transition-all ${activeTab === 'khatib' ? 'bg-white text-emerald-800 shadow-sm' : 'text-slate-500'}`}>Khatib Jumat</button>
                                    <button onClick={() => setActiveTab('kajian')} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase transition-all ${activeTab === 'kajian' ? 'bg-white text-emerald-800 shadow-sm' : 'text-slate-500'}`}>Kajian Sunnah</button>
                                </div>

                                <button onClick={copyToWhatsApp} className="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black text-[10px] uppercase flex items-center justify-center gap-2 shadow-xl active:scale-95 transition-all">
                                    <Icon name="copy" /> Salin Teks Jadwal (WhatsApp)
                                </button>

                                <div className="space-y-4">
                                    {loading ? (
                                        <div className="p-10 text-center text-slate-300 text-[10px] font-black uppercase animate-pulse tracking-widest">Sinkronisasi Data...</div>
                                    ) : filtered.length === 0 ? (
                                        <div className="p-10 text-center text-slate-400 text-[10px] font-bold">Tidak ada jadwal yang ditemukan.</div>
                                    ) : filtered.map(item => (
                                        <div key={item.id} className="bg-white p-5 rounded-[2.5rem] border border-slate-100 shadow-sm flex gap-4 hover:shadow-md transition-shadow">
                                            <div className="w-12 h-14 bg-emerald-50 rounded-2xl flex flex-col items-center justify-center text-emerald-900 flex-shrink-0 border border-emerald-100">
                                                <span className="text-lg font-black leading-none">{new Date(item.tanggal).getDate()}</span>
                                                <span className="text-[7px] font-black uppercase">{new Date(item.tanggal).toLocaleString('id-ID', {month:'short'})}</span>
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <div className="flex justify-between items-start">
                                                    <h3 className="font-black text-xs uppercase text-slate-800 truncate pr-2">{item.ustadzNama}</h3>
                                                    <span className="text-[7px] font-black bg-slate-100 text-slate-500 px-2 py-1 rounded-full uppercase shrink-0">{item.kota}</span>
                                                </div>
                                                <div className="flex gap-4 mt-2 opacity-70 text-[9px] font-bold">
                                                    <div className="flex items-center gap-1"><Icon name="clock" className="w-3 h-3 text-emerald-600" /> {item.jam} WIB</div>
                                                    <div className="flex items-center gap-1"><Icon name="building" className="w-3 h-3 text-emerald-600" /> {item.masjid}</div>
                                                </div>
                                                {item.topik && <p className="mt-2 text-[8px] font-bold text-slate-400 italic bg-slate-50 p-2 rounded-xl">"{item.topik}"</p>}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer Copyright */}
                    <footer className="max-w-xl mx-auto py-8 text-center border-t border-slate-100 mt-10">
                        <p className="text-[9px] font-black uppercase tracking-[0.3em] text-slate-300">
                            &copy; SAMKID PROJECT 2026
                        </p>
                    </footer>

                    {status && (
                        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full text-[9px] font-black uppercase tracking-widest animate-fade-in shadow-2xl z-[100]">
                            {status}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
